name: exchange_calculator
description: "Currency exchange calculator - Crypto to Fiat"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  dio: ^5.8.0
  equatable: ^2.0.7
  bloc_concurrency: ^0.3.0
  intl: ^0.20.0
  get_it: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/cripto_currencies/
    - assets/fiat_currencies/
